<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams - Team Selector</title>
  <link rel="stylesheet" href="styles-phase3b.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <button class="language-toggle" onclick="toggleLanguage()">
        <span id="langToggleText">עב</span>
      </button>

      <h1 id="headerTitle">
        <span class="sport-icon">🏆</span>
        <span id="teamsReadyText">Teams Ready!</span>
      </h1>
    </header>

    <!-- Trophy -->
    <div class="team-trophy">🏆</div>

    <!-- Balance Badge -->
    <div class="text-center">
      <div class="balance-badge perfect" id="balanceBadge">
        <span id="balanceText">Perfectly Balanced!</span>
      </div>
    </div>

    <!-- Teams Grid -->
    <div class="teams-grid">
      <!-- Team 1 -->
      <div class="team-card">
        <div class="team-header">
          <h2 class="team-title">
            <span>🔵</span>
            <span id="team1Title">Team 1</span>
          </h2>
          <div class="team-total">
            <span id="totalLabel1">Total</span>: <span id="team1Total">0</span>
          </div>
        </div>
        <div id="team1Players"></div>
      </div>

      <!-- Team 2 -->
      <div class="team-card">
        <div class="team-header">
          <h2 class="team-title">
            <span>🔴</span>
            <span id="team2Title">Team 2</span>
          </h2>
          <div class="team-total">
            <span id="totalLabel2">Total</span>: <span id="team2Total">0</span>
          </div>
        </div>
        <div id="team2Players"></div>
      </div>
    </div>

    <!-- Bench (if any) -->
    <div class="team-card hidden" id="benchSection">
      <div class="team-header">
        <h2 class="team-title">
          <span>⏸️</span>
          <span id="benchTitle">Bench</span>
        </h2>
      </div>
      <div id="benchPlayers"></div>
    </div>

    <!-- Action Buttons -->
    <div class="btn-group mt-lg">
      <button class="btn btn-secondary" onclick="regenerateTeams()">
        <span style="font-size: 20px;">🎲</span>
        <span id="shuffleBtn">Shuffle</span>
      </button>
      <button class="btn btn-primary" onclick="newSession()">
        <span style="font-size: 20px;">➕</span>
        <span id="newSessionBtn">New Session</span>
      </button>
    </div>
  </div>

  <script type="module">
    import { getToken } from './lib/auth.js';
    import { t, initLanguage, toggleLanguage as toggleLang, getLanguage } from './i18n.js';

    const API_BASE = window.location.origin;
    const token = getToken();

    if (!token) {
      window.location.href = '/login.html';
    }

    // Initialize language
    initLanguage();

    // Check for session data
    const sessionDataStr = sessionStorage.getItem('currentSession');
    if (!sessionDataStr) {
      window.location.href = '/session-setup.html';
    }

    const sessionData = JSON.parse(sessionDataStr);
    const currentSport = sessionData.sport || 'basketball';

    // Language toggle
    window.toggleLanguage = function() {
      toggleLang();
      updateAllText();
      displayTeams(sessionData);
    };

    // Update all text elements
    function updateAllText() {
      const lang = getLanguage();
      document.getElementById('langToggleText').textContent = lang === 'en' ? 'עב' : 'EN';
      document.getElementById('teamsReadyText').textContent = t('teamsReady');
      document.getElementById('team1Title').textContent = `${t('team')} 1`;
      document.getElementById('team2Title').textContent = `${t('team')} 2`;
      document.getElementById('benchTitle').textContent = t('bench');
      document.getElementById('totalLabel1').textContent = t('total');
      document.getElementById('totalLabel2').textContent = t('total');
      document.getElementById('shuffleBtn').textContent = t('shuffle');
      document.getElementById('newSessionBtn').textContent = t('newSession');
    }

    // Display teams
    displayTeams(sessionData);
    updateAllText();

    function displayTeams(data) {
      const { teams, bench, balance, groupName } = data;

      // Header
      if (groupName) {
        document.getElementById('teamsReadyText').textContent = groupName;
      }

      // Balance badge
      const balanceBadge = document.getElementById('balanceBadge');
      const balanceTextEl = document.getElementById('balanceText');
      const ratingDiff = balance?.ratingDifference || 0;

      if (ratingDiff <= 1) {
        balanceTextEl.textContent = t('perfectBalance');
        balanceBadge.className = 'balance-badge perfect';
      } else if (ratingDiff <= 3) {
        balanceTextEl.textContent = t('wellBalanced');
        balanceBadge.className = 'balance-badge good';
      } else {
        balanceTextEl.textContent = t('fairBalance', ratingDiff);
        balanceBadge.className = 'balance-badge fair';
      }

      // Team 1
      if (teams && teams[0]) {
        renderTeamPlayers('team1Players', teams[0].players);
        document.getElementById('team1Total').textContent = teams[0].totalRating || 0;
      }

      // Team 2
      if (teams && teams[1]) {
        renderTeamPlayers('team2Players', teams[1].players);
        document.getElementById('team2Total').textContent = teams[1].totalRating || 0;
      }

      // Bench
      if (bench && bench.length > 0) {
        document.getElementById('benchSection').classList.remove('hidden');
        renderTeamPlayers('benchPlayers', bench);
      } else {
        document.getElementById('benchSection').classList.add('hidden');
      }
    }

    function renderTeamPlayers(containerId, players) {
      const container = document.getElementById(containerId);
      const avatarClass = currentSport === 'basketball' ? 'basketball' : 'football';

      container.innerHTML = players.map(player => {
        const initial = player.name.charAt(0).toUpperCase();

        return `
          <div class="team-player">
            <div class="player-avatar ${avatarClass}">${initial}</div>
            <div class="player-info">
              <div class="player-name">${player.name}</div>
              <div class="player-position">${player.position || t('noPosition')}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    window.regenerateTeams = async function() {
      if (!confirm(t('shuffleTeamsConfirm'))) return;

      try {
        const response = await fetch(`${API_BASE}/api/sessions/generate-teams`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            sessionId: sessionData.sessionId,
            teamSize: sessionData.teamSize
          })
        });

        if (!response.ok) {
          throw new Error('Failed to regenerate teams');
        }

        const data = await response.json();

        // Update session data
        sessionData.teams = data.teams;
        sessionData.bench = data.bench;
        sessionData.balance = data.balance;

        sessionStorage.setItem('currentSession', JSON.stringify(sessionData));

        // Re-display
        displayTeams(sessionData);

        showToast(t('teamsShuffled'), 'success');
      } catch (error) {
        console.error('Regenerate error:', error);
        showToast(t('failedToGenerateTeams'), 'error');
      }
    };

    window.newSession = function() {
      sessionStorage.removeItem('currentSession');
      window.location.href = '/session-setup.html';
    };

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.remove();
      }, 3000);
    }
  </script>
</body>
</html>
