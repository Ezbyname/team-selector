<template id="reset-password-modal-template">
  <style>
    .reset-password-modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      animation: fadeIn 0.2s;
    }

    .reset-password-modal-overlay.active {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .reset-password-modal {
      background: white;
      border-radius: 16px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .reset-password-modal-header {
      padding: 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .reset-password-modal-title {
      font-size: 20px;
      font-weight: 700;
      color: #1f2937;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
    }

    .reset-password-modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #6b7280;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .reset-password-modal-close:hover {
      background: #f3f4f6;
      color: #1f2937;
    }

    .reset-password-modal-body {
      padding: 24px;
    }

    .reset-password-info {
      background: #fef3c7;
      border-left: 4px solid #f59e0b;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
    }

    .reset-password-info p {
      margin: 0;
      font-size: 14px;
      color: #92400e;
      line-height: 1.5;
    }

    .reset-password-info strong {
      display: block;
      margin-bottom: 8px;
      color: #78350f;
    }

    .members-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 400px;
      overflow-y: auto;
    }

    .member-item {
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .member-item:hover {
      border-color: #667eea;
      background: #f9fafb;
    }

    .member-item.selected {
      border-color: #667eea;
      background: #eef2ff;
    }

    .member-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .member-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .member-details {
      display: flex;
      flex-direction: column;
    }

    .member-name {
      font-weight: 600;
      color: #1f2937;
      font-size: 14px;
    }

    .member-phone {
      font-size: 12px;
      color: #6b7280;
    }

    .member-role-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      background: #e5e7eb;
      color: #6b7280;
    }

    .member-role-badge.admin {
      background: #fee2e2;
      color: #991b1b;
    }

    .loading-members {
      text-align: center;
      padding: 40px 20px;
      color: #6b7280;
    }

    .no-members {
      text-align: center;
      padding: 40px 20px;
      color: #6b7280;
    }

    .reset-password-modal-footer {
      padding: 20px 24px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .btn-cancel {
      padding: 10px 20px;
      border: 2px solid #e5e7eb;
      background: white;
      color: #6b7280;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel:hover {
      border-color: #d1d5db;
      background: #f9fafb;
    }

    .btn-reset {
      padding: 10px 20px;
      border: none;
      background: #dc2626;
      color: white;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-reset:hover:not(:disabled) {
      background: #b91c1c;
    }

    .btn-reset:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-message {
      background: #fee2e2;
      border-left: 4px solid #dc2626;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      color: #991b1b;
      font-size: 14px;
    }

    .success-message {
      background: #d1fae5;
      border-left: 4px solid #10b981;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      color: #065f46;
      font-size: 14px;
    }
  </style>

  <div class="reset-password-modal-overlay" id="resetPasswordModalOverlay">
    <div class="reset-password-modal">
      <div class="reset-password-modal-header">
        <h2 class="reset-password-modal-title">
          <span>🔐</span>
          Reset Player Password
        </h2>
        <button class="reset-password-modal-close" id="resetPasswordModalClose">×</button>
      </div>

      <div class="reset-password-modal-body">
        <div class="reset-password-info">
          <strong>⚠️ Important</strong>
          <p>The selected player will be required to set a new password the next time they log in. Their account and team memberships will remain unchanged.</p>
        </div>

        <div id="resetPasswordError" class="error-message" style="display: none;"></div>
        <div id="resetPasswordSuccess" class="success-message" style="display: none;"></div>

        <div id="membersLoading" class="loading-members">
          Loading team members...
        </div>

        <div id="membersList" class="members-list" style="display: none;"></div>

        <div id="noMembers" class="no-members" style="display: none;">
          No members available to reset.
        </div>
      </div>

      <div class="reset-password-modal-footer">
        <button class="btn-cancel" id="resetPasswordCancel">Cancel</button>
        <button class="btn-reset" id="resetPasswordConfirm" disabled>Reset Password</button>
      </div>
    </div>
  </div>
</template>

<script type="module">
  import { getToken } from '../lib/auth.js';

  const API_BASE = window.location.origin;
  let selectedMemberId = null;
  let currentGroupId = null;

  class ResetPasswordModal {
    constructor() {
      this.isOpen = false;
      this.init();
    }

    init() {
      // Clone template and append to body
      const template = document.getElementById('reset-password-modal-template');
      const clone = template.content.cloneNode(true);
      document.body.appendChild(clone);

      // Get elements
      this.overlay = document.getElementById('resetPasswordModalOverlay');
      this.closeBtn = document.getElementById('resetPasswordModalClose');
      this.cancelBtn = document.getElementById('resetPasswordCancel');
      this.confirmBtn = document.getElementById('resetPasswordConfirm');
      this.membersLoading = document.getElementById('membersLoading');
      this.membersList = document.getElementById('membersList');
      this.noMembers = document.getElementById('noMembers');
      this.errorDiv = document.getElementById('resetPasswordError');
      this.successDiv = document.getElementById('resetPasswordSuccess');

      // Bind events
      this.closeBtn.addEventListener('click', () => this.close());
      this.cancelBtn.addEventListener('click', () => this.close());
      this.confirmBtn.addEventListener('click', () => this.confirm());
      this.overlay.addEventListener('click', (e) => {
        if (e.target === this.overlay) this.close();
      });
    }

    async open(groupId) {
      currentGroupId = groupId;
      selectedMemberId = null;
      this.isOpen = true;
      this.overlay.classList.add('active');
      this.confirmBtn.disabled = true;
      this.hideMessages();

      // Load members
      await this.loadMembers(groupId);
    }

    close() {
      this.isOpen = false;
      this.overlay.classList.remove('active');
      selectedMemberId = null;
      currentGroupId = null;
    }

    hideMessages() {
      this.errorDiv.style.display = 'none';
      this.successDiv.style.display = 'none';
    }

    showError(message) {
      this.errorDiv.textContent = message;
      this.errorDiv.style.display = 'block';
      this.successDiv.style.display = 'none';
    }

    showSuccess(message) {
      this.successDiv.textContent = message;
      this.successDiv.style.display = 'block';
      this.errorDiv.style.display = 'none';
    }

    async loadMembers(groupId) {
      this.membersLoading.style.display = 'block';
      this.membersList.style.display = 'none';
      this.noMembers.style.display = 'none';

      try {
        const token = getToken();
        const response = await fetch(`${API_BASE}/api/groups/my-teams-all?groupId=${groupId}`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (!response.ok) {
          throw new Error('Failed to load members');
        }

        const data = await response.json();

        // Get current user ID from token
        const payload = JSON.parse(atob(token.split('.')[1]));
        const currentUserId = payload.sub;

        // Filter: only active members, exclude current user (admin can't reset own password)
        const members = data.teams
          .flatMap(team => team.members || [])
          .filter(member =>
            member.status === 'active' &&
            member.id !== currentUserId
          );

        this.membersLoading.style.display = 'none';

        if (members.length === 0) {
          this.noMembers.style.display = 'block';
          return;
        }

        this.displayMembers(members);

      } catch (error) {
        console.error('Error loading members:', error);
        this.membersLoading.style.display = 'none';
        this.showError('Failed to load team members. Please try again.');
      }
    }

    displayMembers(members) {
      this.membersList.style.display = 'flex';
      this.membersList.innerHTML = members.map(member => `
        <div class="member-item" data-member-id="${member.id}">
          <div class="member-info">
            <div class="member-icon">👤</div>
            <div class="member-details">
              <div class="member-name">${this.escapeHtml(member.phone || 'Unknown')}</div>
              <div class="member-phone">${this.escapeHtml(member.phoneNormalized || '')}</div>
            </div>
          </div>
          <span class="member-role-badge ${member.role}">${this.getRoleLabel(member.role)}</span>
        </div>
      `).join('');

      // Add click handlers
      this.membersList.querySelectorAll('.member-item').forEach(item => {
        item.addEventListener('click', () => {
          const memberId = item.getAttribute('data-member-id');
          this.selectMember(memberId);
        });
      });
    }

    selectMember(memberId) {
      selectedMemberId = memberId;

      // Update UI
      this.membersList.querySelectorAll('.member-item').forEach(item => {
        if (item.getAttribute('data-member-id') === memberId) {
          item.classList.add('selected');
        } else {
          item.classList.remove('selected');
        }
      });

      this.confirmBtn.disabled = false;
      this.hideMessages();
    }

    async confirm() {
      if (!selectedMemberId || !currentGroupId) return;

      this.confirmBtn.disabled = true;
      this.confirmBtn.textContent = 'Resetting...';
      this.hideMessages();

      try {
        const token = getToken();
        const response = await fetch(`${API_BASE}/api/groups/reset-member-password`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            groupId: currentGroupId,
            userId: selectedMemberId
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to reset password');
        }

        this.showSuccess('✅ Password reset required on next login. The player will be prompted to set a new password.');

        // Close modal after 2 seconds
        setTimeout(() => {
          this.close();
        }, 2000);

      } catch (error) {
        console.error('Error resetting password:', error);
        this.showError(error.message || 'Failed to reset password. Please try again.');
        this.confirmBtn.disabled = false;
        this.confirmBtn.textContent = 'Reset Password';
      }
    }

    getRoleLabel(role) {
      const labels = {
        'admin': 'Admin',
        'sub_admin': 'Sub Admin',
        'user': 'Member'
      };
      return labels[role] || 'Member';
    }

    escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  }

  // Create global instance
  window.resetPasswordModal = new ResetPasswordModal();
</script>
