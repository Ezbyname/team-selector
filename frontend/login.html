<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Team Selector</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="auth-container">
    <!-- Phone Entry Screen -->
    <section id="phoneScreen" class="auth-screen active">
      <div class="auth-card">
        <div class="auth-icon">📱</div>
        <h2 class="auth-title">Welcome</h2>
        <p class="auth-subtitle">Enter your phone number to continue</p>

        <form class="auth-form" id="phoneForm">
          <div class="form-group">
            <label for="phoneInput">Phone Number</label>
            <div class="phone-field">
              <button type="button" class="country-selector" id="countrySelector" aria-label="Select country">
                <img id="selectedFlag" class="country-flag" src="https://flagcdn.com/w40/il.png" alt="IL">
                <span id="selectedCode">IL</span>
              </button>

              <div class="phone-input-wrapper">
                <div class="phone-prefix" id="phonePrefix">+972</div>
                <input
                  id="phoneInput"
                  class="phone-input"
                  type="tel"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  placeholder="501234567"
                  autocomplete="tel-national"
                  required
                />
              </div>

              <div class="country-dropdown hidden" id="countryDropdown">
              <button type="button" class="country-option" data-code="IL" data-prefix="+972" data-flag-src="https://flagcdn.com/w40/il.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/il.png"> IL</span>
                <span>+972</span>
              </button>
              <button type="button" class="country-option" data-code="US" data-prefix="+1" data-flag-src="https://flagcdn.com/w40/us.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/us.png"> US</span>
                <span>+1</span>
              </button>
              <div class="country-divider"></div>
              <button type="button" class="country-option" data-code="AT" data-prefix="+43" data-flag-src="https://flagcdn.com/w40/at.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/at.png"> AT</span>
                <span>+43</span>
              </button>
              <button type="button" class="country-option" data-code="AU" data-prefix="+61" data-flag-src="https://flagcdn.com/w40/au.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/au.png"> AU</span>
                <span>+61</span>
              </button>
              <button type="button" class="country-option" data-code="BE" data-prefix="+32" data-flag-src="https://flagcdn.com/w40/be.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/be.png"> BE</span>
                <span>+32</span>
              </button>
              <button type="button" class="country-option" data-code="CN" data-prefix="+86" data-flag-src="https://flagcdn.com/w40/cn.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/cn.png"> CN</span>
                <span>+86</span>
              </button>
              <button type="button" class="country-option" data-code="DK" data-prefix="+45" data-flag-src="https://flagcdn.com/w40/dk.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/dk.png"> DK</span>
                <span>+45</span>
              </button>
              <button type="button" class="country-option" data-code="FI" data-prefix="+358" data-flag-src="https://flagcdn.com/w40/fi.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/fi.png"> FI</span>
                <span>+358</span>
              </button>
              <button type="button" class="country-option" data-code="FR" data-prefix="+33" data-flag-src="https://flagcdn.com/w40/fr.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/fr.png"> FR</span>
                <span>+33</span>
              </button>
              <button type="button" class="country-option" data-code="DE" data-prefix="+49" data-flag-src="https://flagcdn.com/w40/de.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/de.png"> DE</span>
                <span>+49</span>
              </button>
              <button type="button" class="country-option" data-code="IN" data-prefix="+91" data-flag-src="https://flagcdn.com/w40/in.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/in.png"> IN</span>
                <span>+91</span>
              </button>
              <button type="button" class="country-option" data-code="IT" data-prefix="+39" data-flag-src="https://flagcdn.com/w40/it.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/it.png"> IT</span>
                <span>+39</span>
              </button>
              <button type="button" class="country-option" data-code="JP" data-prefix="+81" data-flag-src="https://flagcdn.com/w40/jp.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/jp.png"> JP</span>
                <span>+81</span>
              </button>
              <button type="button" class="country-option" data-code="NL" data-prefix="+31" data-flag-src="https://flagcdn.com/w40/nl.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/nl.png"> NL</span>
                <span>+31</span>
              </button>
              <button type="button" class="country-option" data-code="NO" data-prefix="+47" data-flag-src="https://flagcdn.com/w40/no.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/no.png"> NO</span>
                <span>+47</span>
              </button>
              <button type="button" class="country-option" data-code="PL" data-prefix="+48" data-flag-src="https://flagcdn.com/w40/pl.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/pl.png"> PL</span>
                <span>+48</span>
              </button>
              <button type="button" class="country-option" data-code="PT" data-prefix="+351" data-flag-src="https://flagcdn.com/w40/pt.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/pt.png"> PT</span>
                <span>+351</span>
              </button>
              <button type="button" class="country-option" data-code="RU" data-prefix="+7" data-flag-src="https://flagcdn.com/w40/ru.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/ru.png"> RU</span>
                <span>+7</span>
              </button>
              <button type="button" class="country-option" data-code="KR" data-prefix="+82" data-flag-src="https://flagcdn.com/w40/kr.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/kr.png"> KR</span>
                <span>+82</span>
              </button>
              <button type="button" class="country-option" data-code="ES" data-prefix="+34" data-flag-src="https://flagcdn.com/w40/es.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/es.png"> ES</span>
                <span>+34</span>
              </button>
              <button type="button" class="country-option" data-code="SE" data-prefix="+46" data-flag-src="https://flagcdn.com/w40/se.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/se.png"> SE</span>
                <span>+46</span>
              </button>
              <button type="button" class="country-option" data-code="CH" data-prefix="+41" data-flag-src="https://flagcdn.com/w40/ch.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/ch.png"> CH</span>
                <span>+41</span>
              </button>
              <button type="button" class="country-option" data-code="GB" data-prefix="+44" data-flag-src="https://flagcdn.com/w40/gb.png">
                <span><img class="country-flag" src="https://flagcdn.com/w40/gb.png"> GB</span>
                <span>+44</span>
              </button>
            </div>
            </div>

            <small class="input-hint">We'll send a verification code via SMS</small>
          </div>

          <button type="submit" class="primary-btn">Send Code</button>
        </form>
      </div>
    </section>

    <!-- OTP Verification Screen -->
    <section id="otpScreen" class="auth-screen">
      <div class="auth-card">
        <div class="auth-icon">🔐</div>
        <h2 class="auth-title">Verify Code</h2>
        <p class="auth-subtitle">
          Enter the code sent to <strong id="otpPhoneDisplay"></strong>
        </p>

        <form class="auth-form" id="otpForm">
          <div class="form-group">
            <label for="otpInput">Verification Code</label>
            <input
              type="text"
              id="otpInput"
              placeholder="123456"
              maxlength="6"
              pattern="[0-9]{6}"
              autocomplete="one-time-code"
              required
            />
          </div>

          <button type="submit" class="primary-btn">Verify</button>
          <button type="button" class="link-btn" id="changePhoneBtn">← Change phone number</button>
        </form>
      </div>
    </section>

    <!-- Registration Screen (New Users) -->
    <section id="registerScreen" class="auth-screen">
      <div class="auth-card">
        <div class="auth-icon">✨</div>
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">
          Set up your account for <strong id="registerPhoneDisplay"></strong>
        </p>

        <form class="auth-form" id="registerForm">
          <div class="form-group">
            <label for="registerNameInput">Display Name</label>
            <input
              type="text"
              id="registerNameInput"
              placeholder="Your name"
              autocomplete="name"
              required
            />
          </div>

          <div class="form-group">
            <label for="registerPasswordInput">Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="registerPasswordInput"
                placeholder="At least 8 characters"
                autocomplete="new-password"
                minlength="8"
                required
              />
              <button type="button" class="password-toggle" data-toggle="registerPasswordInput">
                👁️
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="registerConfirmPasswordInput">Confirm Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="registerConfirmPasswordInput"
                placeholder="Re-enter password"
                autocomplete="new-password"
                minlength="8"
                required
              />
              <button type="button" class="password-toggle" data-toggle="registerConfirmPasswordInput">
                👁️
              </button>
            </div>
          </div>

          <button type="submit" class="primary-btn">Create Account</button>
        </form>
      </div>
    </section>

    <!-- Login Screen (Existing Users) -->
    <section id="loginScreen" class="auth-screen">
      <div class="auth-card">
        <div class="auth-icon">🔑</div>
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">
          Login as <strong id="loginPhoneDisplay"></strong>
        </p>

        <form class="auth-form" id="loginForm">
          <div class="form-group">
            <label for="loginPasswordInput">Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="loginPasswordInput"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              />
              <button type="button" class="password-toggle" data-toggle="loginPasswordInput">
                👁️
              </button>
            </div>
          </div>

          <button type="submit" class="primary-btn">Login</button>
          <button type="button" class="link-btn" id="useDifferentPhoneBtn">← Use different phone</button>
        </form>
      </div>
    </section>

    <div id="errorMessage" class="error-message hidden"></div>
  </div>

  <script type="module">
    import { getToken, saveToken } from './lib/auth.js';

    const API_BASE = window.location.origin;
    let currentPhone = '';
    let currentCountryCode = '+972'; // Default to Israel

    // Check if already logged in
    const token = getToken();
    if (token) {
      window.location.href = '/dashboard.html';
    }

    // Elements
    const phoneForm = document.getElementById('phoneForm');
    const otpForm = document.getElementById('otpForm');
    const registerForm = document.getElementById('registerForm');
    const loginForm = document.getElementById('loginForm');
    const phoneInput = document.getElementById('phoneInput');
    const otpInput = document.getElementById('otpInput');
    const errorMessage = document.getElementById('errorMessage');

    // Setup country selector
    setupCountrySelector();

    // Show error
    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.remove('hidden');
      setTimeout(() => {
        errorMessage.classList.add('hidden');
      }, 5000);
    }

    // Show screen
    function showScreen(screenId) {
      document.querySelectorAll('.auth-screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    // Setup country selector dropdown
    function setupCountrySelector() {
      const countrySelector = document.getElementById('countrySelector');
      const countryDropdown = document.getElementById('countryDropdown');
      const phonePrefix = document.getElementById('phonePrefix');
      const selectedFlag = document.getElementById('selectedFlag');
      const selectedCode = document.getElementById('selectedCode');

      if (!countrySelector || !countryDropdown) return;

      // Toggle dropdown
      countrySelector.addEventListener('click', (e) => {
        e.stopPropagation();
        countryDropdown.classList.toggle('hidden');
      });

      // Handle country selection
      countryDropdown.querySelectorAll('.country-option').forEach(option => {
        option.addEventListener('click', (e) => {
          e.stopPropagation();
          const flag = option.getAttribute('data-flag');
          const code = option.getAttribute('data-code');
          const prefix = option.getAttribute('data-prefix');

          selectedFlag.textContent = flag;
          selectedCode.textContent = code;
          phonePrefix.textContent = prefix;
          currentCountryCode = prefix;
          phoneInput.value = '';
          countryDropdown.classList.add('hidden');
        });
      });

      // Close on outside click
      document.addEventListener('click', (e) => {
        if (!countrySelector.contains(e.target) && !countryDropdown.contains(e.target)) {
          countryDropdown.classList.add('hidden');
        }
      });

      // Digits only
      phoneInput.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^\d]/g, '');
      });
    }

    // Phone form
    phoneForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const phone = phoneInput.value.trim();

      // Validate digits only
      if (!/^\d+$/.test(phone)) {
        showError('Phone number must contain only digits');
        return;
      }

      // Validate length
      if (phone.length < 8 || phone.length > 12) {
        showError('Phone number must be between 8 and 12 digits');
        return;
      }

      currentPhone = phone;

      const submitBtn = phoneForm.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        const response = await fetch(`${API_BASE}/api/auth/send-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: currentPhone, countryCode: currentCountryCode })
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.error || 'Failed to send code');
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          return;
        }

        // Check if user already exists
        if (data.userExists) {
          // Existing user - go directly to login
          document.getElementById('loginPhoneDisplay').textContent = currentPhone;
          showScreen('loginScreen');
          document.getElementById('loginPasswordInput').focus();
        } else {
          // New user - go to OTP verification
          document.getElementById('otpPhoneDisplay').textContent = currentPhone;
          showScreen('otpScreen');
          otpInput.focus();
        }

        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      } catch (error) {
        showError('Network error. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });

    // OTP form
    otpForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = otpInput.value.trim();

      const submitBtn = otpForm.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Verifying...';

      try {
        const response = await fetch(`${API_BASE}/api/auth/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: currentPhone, code })
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.error || 'Invalid code');
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          return;
        }

        // Check if user exists
        if (data.userExists) {
          document.getElementById('loginPhoneDisplay').textContent = currentPhone;
          showScreen('loginScreen');
          document.getElementById('loginPasswordInput').focus();
        } else {
          document.getElementById('registerPhoneDisplay').textContent = currentPhone;
          showScreen('registerScreen');
          document.getElementById('registerNameInput').focus();
        }

        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      } catch (error) {
        showError('Network error. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });

    // Register form
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('registerNameInput').value.trim();
      const password = document.getElementById('registerPasswordInput').value;
      const confirmPassword = document.getElementById('registerConfirmPasswordInput').value;

      if (password !== confirmPassword) {
        showError('Passwords do not match');
        return;
      }

      const submitBtn = registerForm.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating Account...';

      try {
        const response = await fetch(`${API_BASE}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: currentPhone, password, displayName: name })
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.error || 'Registration failed');
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          return;
        }

        saveToken(data.accessToken);
        window.location.href = '/dashboard.html';
      } catch (error) {
        showError('Network error. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });

    // Login form
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('loginPasswordInput').value;

      const submitBtn = loginForm.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';

      try {
        const response = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: currentPhone, password })
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.error || 'Login failed');
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          return;
        }

        saveToken(data.accessToken);
        window.location.href = '/dashboard.html';
      } catch (error) {
        showError('Network error. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });

    // Change phone buttons
    document.getElementById('changePhoneBtn').addEventListener('click', () => {
      showScreen('phoneScreen');
      otpInput.value = '';
    });

    document.getElementById('useDifferentPhoneBtn').addEventListener('click', () => {
      showScreen('phoneScreen');
      document.getElementById('loginPasswordInput').value = '';
    });

    // Password visibility toggles
    document.querySelectorAll('.password-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const inputId = btn.getAttribute('data-toggle');
        const input = document.getElementById(inputId);

        if (input.type === 'password') {
          input.type = 'text';
          btn.textContent = '🙈';
        } else {
          input.type = 'password';
          btn.textContent = '👁️';
        }
      });
    });
  </script>
</body>
</html>
