<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Team - Team Selector</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .create-team-container {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .create-team-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .back-link {
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .form-title {
      font-size: 28px;
      font-weight: 700;
      color: #333;
      margin: 0 0 10px;
    }

    .form-subtitle {
      font-size: 14px;
      color: #666;
      margin: 0 0 30px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    .form-input:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-input:disabled {
      background: #f5f5f5;
      cursor: not-allowed;
    }

    .sport-display {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #f5f5f5;
      border-radius: 8px;
      font-size: 16px;
      color: #333;
    }

    .sport-icon {
      font-size: 24px;
    }

    .submit-button {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .submit-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .submit-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      margin-bottom: 20px;
      border-left: 4px solid #c33;
    }

    @media (max-width: 640px) {
      .create-team-card {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="create-team-container">
    <div class="create-team-card">
      <a href="#" class="back-link" id="backLink">
        ← Back to teams
      </a>

      <h1 class="form-title">Create New Team</h1>
      <p class="form-subtitle">You will be the admin of this team</p>

      <div id="errorMessage" class="error-message"></div>

      <form id="createTeamForm" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label class="form-label">Sport</label>
          <div class="sport-display">
            <span class="sport-icon" id="sportIcon"></span>
            <span id="sportName"></span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="teamName">Team Name</label>
          <input
            type="text"
            id="teamName"
            class="form-input"
            placeholder="Enter team name"
            required
            maxlength="50"
            autocomplete="off"
          />
        </div>

        <button type="submit" class="submit-button" id="submitButton">
          Create Team
        </button>
      </form>
    </div>
  </div>

  <script type="module">
    // Check authentication
    const accessToken = localStorage.getItem('accessToken');
    if (!accessToken) {
      window.location.href = '/login.html';
    }

    // Get sport from URL
    const urlParams = new URLSearchParams(window.location.search);
    const sport = urlParams.get('sport');

    if (!sport || !['basketball', 'soccer'].includes(sport)) {
      window.location.href = '/sport-selection.html';
    }

    // Sport configuration
    const sportConfig = {
      basketball: { icon: '🏀', name: 'Basketball' },
      soccer: { icon: '⚽', name: 'Football' }
    };

    // Set sport display
    document.getElementById('sportIcon').textContent = sportConfig[sport].icon;
    document.getElementById('sportName').textContent = sportConfig[sport].name;
    document.getElementById('backLink').href = `/my-teams.html?sport=${sport}`;

    // Handle form submission
    async function handleSubmit(event) {
      event.preventDefault();

      const teamName = document.getElementById('teamName').value.trim();
      const submitButton = document.getElementById('submitButton');
      const errorMessage = document.getElementById('errorMessage');

      if (!teamName) {
        showError('Please enter a team name');
        return;
      }

      // Disable button
      submitButton.disabled = true;
      submitButton.textContent = 'Creating...';
      errorMessage.style.display = 'none';

      try {
        const response = await fetch('/api/groups/create', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${accessToken}`
          },
          body: JSON.stringify({
            name: teamName,
            sport: sport
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to create team');
        }

        // Success - redirect to the new team
        window.location.href = `/session-setup.html?groupId=${data.group.id}`;

      } catch (error) {
        showError(error.message);
        submitButton.disabled = false;
        submitButton.textContent = 'Create Team';
      }
    }

    function showError(message) {
      const errorMessage = document.getElementById('errorMessage');
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';
    }

    window.handleSubmit = handleSubmit;
  </script>
</body>
</html>
