<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d428a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8102e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Rounded rectangle background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>
  <circle cx="256" cy="200" r="200" fill="url(#glow)"/>

  <!-- Cute Basketball Character (Left) -->
  <g transform="translate(150, 180)">
    <!-- Body -->
    <ellipse cx="0" cy="60" rx="45" ry="50" fill="#fd6b2e"/>

    <!-- Head (Basketball) -->
    <circle cx="0" cy="0" r="50" fill="#fd6b2e" stroke="#333" stroke-width="3"/>
    <!-- Basketball lines -->
    <path d="M 0,-50 L 0,50 M -50,0 L 50,0" stroke="#333" stroke-width="3"/>
    <path d="M -35,-35 Q 0,-25 35,-35 M -35,35 Q 0,25 35,35" stroke="#333" stroke-width="3" fill="none"/>

    <!-- Eyes -->
    <circle cx="-15" cy="-5" r="6" fill="#fff"/>
    <circle cx="15" cy="-5" r="6" fill="#fff"/>
    <circle cx="-15" cy="-5" r="3" fill="#333"/>
    <circle cx="15" cy="-5" r="3" fill="#333"/>

    <!-- Happy mouth -->
    <path d="M -15,10 Q 0,20 15,10" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Arms -->
    <ellipse cx="-50" cy="40" rx="12" ry="35" fill="#fd6b2e" transform="rotate(-20 -50 40)"/>
    <ellipse cx="50" cy="40" rx="12" ry="35" fill="#fd6b2e" transform="rotate(20 50 40)"/>

    <!-- Legs -->
    <ellipse cx="-20" cy="105" rx="12" ry="30" fill="#fd6b2e"/>
    <ellipse cx="20" cy="105" rx="12" ry="30" fill="#fd6b2e"/>

    <!-- Shoes -->
    <ellipse cx="-20" cy="130" rx="18" ry="12" fill="#333"/>
    <ellipse cx="20" cy="130" rx="18" ry="12" fill="#333"/>
  </g>

  <!-- Cute Soccer Character (Right) -->
  <g transform="translate(362, 180)">
    <!-- Body -->
    <ellipse cx="0" cy="60" rx="45" ry="50" fill="#00a651"/>

    <!-- Head (Soccer ball) -->
    <circle cx="0" cy="0" r="50" fill="#fff" stroke="#333" stroke-width="3"/>
    <!-- Soccer pentagon -->
    <polygon points="0,-20 -15,-5 -10,15 10,15 15,-5" fill="#333"/>
    <path d="M -15,-5 L -25,-25 M -10,15 L -15,35 M 10,15 L 15,35 M 15,-5 L 25,-25"
          stroke="#333" stroke-width="3"/>

    <!-- Eyes -->
    <circle cx="-15" cy="5" r="6" fill="#333"/>
    <circle cx="15" cy="5" r="6" fill="#333"/>
    <circle cx="-15" cy="5" r="3" fill="#fff"/>
    <circle cx="15" cy="5" r="3" fill="#fff"/>

    <!-- Happy mouth -->
    <path d="M -15,20 Q 0,30 15,20" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Arms -->
    <ellipse cx="-50" cy="40" rx="12" ry="35" fill="#00a651" transform="rotate(-20 -50 40)"/>
    <ellipse cx="50" cy="40" rx="12" ry="35" fill="#00a651" transform="rotate(20 50 40)"/>

    <!-- Legs -->
    <ellipse cx="-20" cy="105" rx="12" ry="30" fill="#00a651"/>
    <ellipse cx="20" cy="105" rx="12" ry="30" fill="#00a651"/>

    <!-- Shoes -->
    <ellipse cx="-20" cy="130" rx="18" ry="12" fill="#fff"/>
    <ellipse cx="20" cy="130" rx="18" ry="12" fill="#fff"/>
  </g>

  <!-- VS Badge -->
  <g transform="translate(256, 340)">
    <circle cx="0" cy="0" r="45" fill="#fdb927" stroke="#333" stroke-width="4"/>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="36" font-weight="bold"
          fill="#333" text-anchor="middle" dominant-baseline="central">VS</text>
  </g>

  <!-- Title -->
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="48" font-weight="bold"
        fill="#fff" text-anchor="middle" stroke="#333" stroke-width="2">TEAMS</text>
</svg>
