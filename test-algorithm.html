<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Tester</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #00ff00;
        }
        .test {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #333;
            background: #0a0a0a;
        }
        .pass { color: #00ff00; }
        .fail { color: #ff0000; }
        .team {
            margin: 10px 0;
            padding: 10px;
            background: #222;
        }
        h2 { color: #00aaff; }
        h3 { color: #ffaa00; }
    </style>
</head>
<body>
    <h1>🧪 Team Selector Algorithm Tester</h1>
    <div id="results"></div>

    <script src="app.js"></script>
    <script>
        const results = document.getElementById('results');

        function createPlayer(name, position, isStar = false, linkedWith = []) {
            return {
                id: Date.now() + Math.random(),
                name,
                position,
                isStar,
                linkedWith
            };
        }

        function runTest(testName, players, teamSize, expectedRules) {
            console.log(`\n🧪 Running: ${testName}`);

            const [team1, team2] = balanceTeams(players, teamSize);

            const results = {
                team1: team1.map(p => ({ name: p.name, pos: p.position, star: p.isStar })),
                team2: team2.map(p => ({ name: p.name, pos: p.position, star: p.isStar }))
            };

            // Check rules
            const checks = [];

            // Rule 1: Equal team sizes
            const sizeCheck = team1.length === team2.length && team1.length === teamSize;
            checks.push({
                rule: 'Equal team sizes',
                pass: sizeCheck,
                detail: `Team1: ${team1.length}, Team2: ${team2.length}, Expected: ${teamSize}`
            });

            // Rule 2: Position balance (for positions with 2+ players)
            // IMPORTANT: Skip position balance check if players of same position are LINKED
            const positions = [...new Set(players.map(p => p.position))];
            positions.forEach(pos => {
                const playersInPos = players.filter(p => p.position === pos);
                const total = playersInPos.length;

                if (total >= 2) {
                    // Check if any two players in this position are linked
                    let hasLinkedInPosition = false;
                    for (let i = 0; i < playersInPos.length; i++) {
                        for (let j = i + 1; j < playersInPos.length; j++) {
                            if (playersInPos[i].linkedWith.includes(playersInPos[j].id)) {
                                hasLinkedInPosition = true;
                                break;
                            }
                        }
                        if (hasLinkedInPosition) break;
                    }

                    const t1Count = team1.filter(p => p.position === pos).length;
                    const t2Count = team2.filter(p => p.position === pos).length;
                    const diff = Math.abs(t1Count - t2Count);

                    if (hasLinkedInPosition) {
                        // If linked, position imbalance is ALLOWED
                        checks.push({
                            rule: `Position ${pos} balance (LINKED - imbalance OK)`,
                            pass: true, // Always pass if linked
                            detail: `Team1: ${t1Count}, Team2: ${t2Count}, Diff: ${diff} (Linked players)`
                        });
                    } else {
                        // If not linked, check balance
                        const balanced = diff <= 1; // Allow max difference of 1
                        checks.push({
                            rule: `Position ${pos} balance`,
                            pass: balanced,
                            detail: `Team1: ${t1Count}, Team2: ${t2Count}, Diff: ${diff}`
                        });
                    }
                }
            });

            // Rule 3: Stars distributed (if 2+ stars not linked)
            const stars = players.filter(p => p.isStar);
            if (stars.length >= 2) {
                const t1Stars = team1.filter(p => p.isStar).length;
                const t2Stars = team2.filter(p => p.isStar).length;
                const starDiff = Math.abs(t1Stars - t2Stars);
                const starsBalanced = starDiff <= 1;
                checks.push({
                    rule: 'Stars distributed',
                    pass: starsBalanced,
                    detail: `Team1: ${t1Stars}⭐, Team2: ${t2Stars}⭐, Diff: ${starDiff}`
                });
            }

            // Display results
            const allPassed = checks.every(c => c.pass);
            const statusClass = allPassed ? 'pass' : 'fail';
            const statusIcon = allPassed ? '✅' : '❌';

            let html = `
                <div class="test">
                    <h2>${statusIcon} ${testName}</h2>
                    <div class="team">
                        <h3>Team 1:</h3>
                        ${team1.map(p => `<div>${p.name} (pos: ${p.position}) ${p.isStar ? '⭐' : ''}</div>`).join('')}
                    </div>
                    <div class="team">
                        <h3>Team 2:</h3>
                        ${team2.map(p => `<div>${p.name} (pos: ${p.position}) ${p.isStar ? '⭐' : ''}</div>`).join('')}
                    </div>
                    <h3>Checks:</h3>
                    ${checks.map(c => `
                        <div class="${c.pass ? 'pass' : 'fail'}">
                            ${c.pass ? '✅' : '❌'} ${c.rule}: ${c.detail}
                        </div>
                    `).join('')}
                </div>
            `;

            return { html, passed: allPassed, checks };
        }

        // ======== TESTS ========

        let totalTests = 0;
        let passedTests = 0;

        // Test 1: Two Centers
        totalTests++;
        const test1 = runTest(
            'Test 1: Two Centers (should split)',
            [
                createPlayer('Player A', 3), // Center = 3
                createPlayer('Player B', 3),
                createPlayer('Player C', 1),
                createPlayer('Player D', 1),
                createPlayer('Player E', 2),
                createPlayer('Player F', 2),
            ],
            3,
            {}
        );
        if (test1.passed) passedTests++;
        results.innerHTML += test1.html;

        // Test 2: Two Star Centers
        totalTests++;
        const test2 = runTest(
            'Test 2: Two Star Centers (should split)',
            [
                createPlayer('Star A', 3, true),
                createPlayer('Star B', 3, true),
                createPlayer('Player C', 1),
                createPlayer('Player D', 1),
                createPlayer('Player E', 2),
                createPlayer('Player F', 2),
            ],
            3,
            {}
        );
        if (test2.passed) passedTests++;
        results.innerHTML += test2.html;

        // Test 3: Perfect Balance (2+2+2)
        totalTests++;
        const test3 = runTest(
            'Test 3: Perfect Balance (2 of each position)',
            [
                createPlayer('Center A', 3),
                createPlayer('Center B', 3),
                createPlayer('Forward A', 2),
                createPlayer('Forward B', 2),
                createPlayer('Guard A', 1),
                createPlayer('Guard B', 1),
            ],
            3,
            {}
        );
        if (test3.passed) passedTests++;
        results.innerHTML += test3.html;

        // Test 4: Uneven (3 Centers, 2 Forwards)
        totalTests++;
        const test4 = runTest(
            'Test 4: Uneven positions (3 Centers, 2 Forwards)',
            [
                createPlayer('Center A', 3),
                createPlayer('Center B', 3),
                createPlayer('Center C', 3),
                createPlayer('Forward A', 2),
                createPlayer('Forward B', 2),
            ],
            2, // 2v2 with 1 bench
            {}
        );
        if (test4.passed) passedTests++;
        results.innerHTML += test4.html;

        // Test 5: Real scenario (Hebrew names)
        totalTests++;
        const test5 = runTest(
            'Test 5: Real Scenario (User Example)',
            [
                createPlayer('מיקי', 2, true), // Forward, Star
                createPlayer('יהגימצח', 2),    // Forward
                createPlayer('חתיב', 3),        // Center
                createPlayer('ונכלכר', 3),      // Center
                createPlayer('לחובבכ', 2),     // Forward
                createPlayer('פבהנטוט', 2),    // Forward
                createPlayer('Player G', 1),
                createPlayer('Player H', 1),
                createPlayer('Player I', 3),
                createPlayer('Player J', 1),
            ],
            5,
            {}
        );
        if (test5.passed) passedTests++;
        results.innerHTML += test5.html;

        // Test 6: Linked Stars Same Position (MUST stay together)
        totalTests++;
        const p1 = createPlayer('Star A', 3, true);
        const p2 = createPlayer('Star B', 3, true);
        p1.linkedWith = [p2.id];
        p2.linkedWith = [p1.id];

        const test6Players = [
            p1, p2,
            createPlayer('Player C', 1),
            createPlayer('Player D', 1),
            createPlayer('Player E', 2),
            createPlayer('Player F', 2),
        ];

        const test6 = runTest(
            'Test 6: Two Star Centers LINKED (must stay together)',
            test6Players,
            3,
            {}
        );

        // Special check: are they together?
        const [t6_team1, t6_team2] = balanceTeams(test6Players, 3);
        const p1InTeam1 = t6_team1.some(p => p.id === p1.id);
        const p2InTeam1 = t6_team1.some(p => p.id === p2.id);
        const linkedTogether = p1InTeam1 === p2InTeam1;

        if (linkedTogether) {
            test6.html += `<div class="pass">✅ LINKED CHECK: Both stars are together!</div>`;
        } else {
            test6.html += `<div class="fail">❌ LINKED CHECK: Stars were separated (FAILED!)</div>`;
        }

        if (test6.passed && linkedTogether) passedTests++;
        results.innerHTML += test6.html;

        // Test 7: Linked Non-Stars Same Position
        totalTests++;
        const p3 = createPlayer('Regular A', 2, false);
        const p4 = createPlayer('Regular B', 2, false);
        p3.linkedWith = [p4.id];
        p4.linkedWith = [p3.id];

        const test7Players = [
            p3, p4,
            createPlayer('Player C', 1),
            createPlayer('Player D', 1),
            createPlayer('Player E', 3),
            createPlayer('Player F', 3),
        ];

        const test7 = runTest(
            'Test 7: Two Forwards LINKED (no stars, must stay together)',
            test7Players,
            3,
            {}
        );

        const [t7_team1, t7_team2] = balanceTeams(test7Players, 3);
        const p3InTeam1 = t7_team1.some(p => p.id === p3.id);
        const p4InTeam1 = t7_team1.some(p => p.id === p4.id);
        const linked7Together = p3InTeam1 === p4InTeam1;

        if (linked7Together) {
            test7.html += `<div class="pass">✅ LINKED CHECK: Both forwards are together!</div>`;
        } else {
            test7.html += `<div class="fail">❌ LINKED CHECK: Forwards were separated (FAILED!)</div>`;
        }

        if (test7.passed && linked7Together) passedTests++;
        results.innerHTML += test7.html;

        // Test 8: One Star Linked with Non-Star
        totalTests++;
        const p5 = createPlayer('Star Player', 3, true);
        const p6 = createPlayer('Friend', 2, false);
        p5.linkedWith = [p6.id];
        p6.linkedWith = [p5.id];

        const test8Players = [
            p5, p6,
            createPlayer('Other Star', 1, true),
            createPlayer('Player D', 1),
            createPlayer('Player E', 2),
            createPlayer('Player F', 3),
        ];

        const test8 = runTest(
            'Test 8: Star+Friend LINKED (different positions)',
            test8Players,
            3,
            {}
        );

        const [t8_team1, t8_team2] = balanceTeams(test8Players, 3);
        const p5InTeam1 = t8_team1.some(p => p.id === p5.id);
        const p6InTeam1 = t8_team1.some(p => p.id === p6.id);
        const linked8Together = p5InTeam1 === p6InTeam1;

        if (linked8Together) {
            test8.html += `<div class="pass">✅ LINKED CHECK: Star and friend are together!</div>`;
        } else {
            test8.html += `<div class="fail">❌ LINKED CHECK: Star and friend were separated (FAILED!)</div>`;
        }

        if (test8.passed && linked8Together) passedTests++;
        results.innerHTML += test8.html;

        // Test 9: Complex - 3 Stars, 2 Linked
        totalTests++;
        const p7 = createPlayer('Star A', 2, true);
        const p8 = createPlayer('Star B', 2, true);
        p7.linkedWith = [p8.id];
        p8.linkedWith = [p7.id];

        const test9Players = [
            p7, p8, // Linked stars
            createPlayer('Star C', 3, true), // Separate star
            createPlayer('Player D', 1),
            createPlayer('Player E', 1),
            createPlayer('Player F', 3),
        ];

        const test9 = runTest(
            'Test 9: 3 Stars, 2 Linked (linked stay together, 3rd separated)',
            test9Players,
            3,
            {}
        );

        const [t9_team1, t9_team2] = balanceTeams(test9Players, 3);
        const p7InTeam1 = t9_team1.some(p => p.id === p7.id);
        const p8InTeam1 = t9_team1.some(p => p.id === p8.id);
        const linked9Together = p7InTeam1 === p8InTeam1;

        if (linked9Together) {
            test9.html += `<div class="pass">✅ LINKED CHECK: Two linked stars are together!</div>`;
        } else {
            test9.html += `<div class="fail">❌ LINKED CHECK: Linked stars were separated (FAILED!)</div>`;
        }

        if (test9.passed && linked9Together) passedTests++;
        results.innerHTML += test9.html;

        // Summary
        results.innerHTML += `
            <div class="test" style="border: 3px solid ${passedTests === totalTests ? '#00ff00' : '#ff0000'}">
                <h2>📊 Summary</h2>
                <h3 class="${passedTests === totalTests ? 'pass' : 'fail'}">
                    ${passedTests} / ${totalTests} tests passed
                    ${passedTests === totalTests ? '✅' : '❌'}
                </h3>
                <div style="margin-top: 20px;">
                    <h3>Test Categories:</h3>
                    <div>✅ Basic Position Balance</div>
                    <div>✅ Star Distribution</div>
                    <div>✅ Linked Players (Stars)</div>
                    <div>✅ Linked Players (Non-Stars)</div>
                    <div>✅ Mixed Scenarios</div>
                </div>
            </div>
        `;

        console.log(`\n📊 Final: ${passedTests}/${totalTests} passed`);
    </script>
</body>
</html>
