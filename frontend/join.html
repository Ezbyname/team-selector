<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <title>Join Team - Team Selector</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .join-container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .team-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .join-title {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a1a;
      margin: 0 0 12px 0;
    }

    .join-subtitle {
      font-size: 16px;
      color: #666;
      margin: 0 0 32px 0;
    }

    .team-preview {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      text-align: left;
    }

    .team-name {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      margin: 0 0 8px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .team-sport {
      font-size: 28px;
    }

    .team-info {
      font-size: 14px;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }

    .btn-primary:disabled {
      background: #93c5fd;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
      margin-top: 12px;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }

    .error-state {
      display: none;
    }

    .error-state.show {
      display: block;
    }

    .error-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .error-title {
      font-size: 20px;
      font-weight: 600;
      color: #ef4444;
      margin: 0 0 12px 0;
    }

    .error-message {
      font-size: 14px;
      color: #64748b;
      margin: 0 0 24px 0;
    }

    .loading-state {
      display: none;
    }

    .loading-state.show {
      display: block;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .success-state {
      display: none;
    }

    .success-state.show {
      display: block;
    }

    .success-icon {
      width: 64px;
      height: 64px;
      background: #10b981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .success-icon svg {
      width: 32px;
      height: 32px;
      color: white;
    }

    .success-title {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      margin: 0 0 8px 0;
    }

    .success-message {
      font-size: 14px;
      color: #64748b;
      margin: 0 0 24px 0;
    }

    .already-member-state {
      display: none;
    }

    .already-member-state.show {
      display: block;
    }

    .info-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    @media (max-width: 640px) {
      .join-container {
        padding: 32px 24px;
      }

      .join-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="join-container">
    <!-- Loading State -->
    <div class="loading-state show" id="loadingState">
      <div class="spinner"></div>
      <h2 class="join-title">Loading invite...</h2>
      <p class="join-subtitle">Please wait</p>
    </div>

    <!-- Join Preview State -->
    <div class="join-preview-state" id="joinPreviewState">
      <div class="team-icon">🏀</div>
      <h1 class="join-title">You've been invited to join:</h1>

      <div class="team-preview">
        <div class="team-name">
          <span class="team-sport" id="teamSport">🏀</span>
          <span id="teamName">Team Name</span>
        </div>
        <div class="team-info">
          <span id="memberCount">0 members</span>
        </div>
      </div>

      <button class="btn btn-primary" id="joinBtn">
        <span>Join Team</span>
      </button>
      <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
    </div>

    <!-- Already Member State -->
    <div class="already-member-state" id="alreadyMemberState">
      <div class="info-icon">ℹ️</div>
      <h2 class="join-title">You are already a member of this team.</h2>
      <button class="btn btn-primary" id="openTeamBtn">
        <span>Open Team</span>
      </button>
      <button class="btn btn-secondary" id="backToTeamsBtn">Back to Teams</button>
    </div>

    <!-- Success State -->
    <div class="success-state" id="successState">
      <div class="success-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
      <h2 class="success-title">Welcome to <span id="successTeamName"></span>!</h2>
      <p class="success-message">You've successfully joined the team</p>
      <button class="btn btn-primary" id="openTeamAfterJoinBtn">
        <span>Open Team</span>
      </button>
    </div>

    <!-- Error State -->
    <div class="error-state" id="errorState">
      <div class="error-icon">❌</div>
      <h2 class="error-title" id="errorTitle">Something went wrong</h2>
      <p class="error-message" id="errorMessage">Please try again later</p>
      <button class="btn btn-secondary" id="backBtn">Back to Home</button>
    </div>
  </div>

  <script type="module">
    // Parse invite code from URL
    function getInviteCodeFromURL() {
      const path = window.location.pathname;
      const match = path.match(/\/join\/([A-Z0-9-]+)/i);
      return match ? match[1] : null;
    }

    // Check if user is logged in
    function isLoggedIn() {
      return !!localStorage.getItem('token');
    }

    // Redirect to login with preserved invite code
    function redirectToLogin(inviteCode) {
      // Store invite code in sessionStorage to preserve through login
      sessionStorage.setItem('pendingInviteCode', inviteCode);
      window.location.href = '/login.html?redirect=join';
    }

    // Show state
    function showState(stateName) {
      const states = ['loadingState', 'joinPreviewState', 'alreadyMemberState', 'successState', 'errorState'];
      states.forEach(state => {
        const el = document.getElementById(state);
        if (el) {
          if (state === stateName) {
            el.classList.add('show');
            el.style.display = 'block';
          } else {
            el.classList.remove('show');
            el.style.display = 'none';
          }
        }
      });
    }

    // Show error
    function showError(title, message) {
      document.getElementById('errorTitle').textContent = title;
      document.getElementById('errorMessage').textContent = message;
      showState('errorState');
    }

    // Get sport icon
    function getSportIcon(sport) {
      return sport === 'basketball' ? '🏀' : '⚽';
    }

    // Fetch team preview (without joining)
    async function fetchTeamPreview(inviteCode) {
      const token = localStorage.getItem('token');

      // For now, we'll use the join-by-code endpoint to validate
      // In the future, you might want a separate preview endpoint
      // For now, we just show the code and let them join
      return { code: inviteCode };
    }

    // Join team with invite code
    async function joinTeam(inviteCode) {
      const token = localStorage.getItem('token');

      try {
        const response = await fetch('/api/groups/join-by-code', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ code: inviteCode })
        });

        const data = await response.json();

        if (!response.ok) {
          // Handle specific error cases
          if (response.status === 404) {
            showError('This invite link is invalid.', 'The invite code does not exist or has been removed.');
          } else if (response.status === 403) {
            if (data.error.includes('no longer active')) {
              showError('This invite link is no longer active.', 'The team admin has revoked this invite code.');
            } else if (data.error.includes('expired')) {
              showError('This invite link has expired.', 'Please ask the team admin for a new invite link.');
            } else {
              showError('Cannot join team', data.error);
            }
          } else if (response.status === 429) {
            showError('Too many attempts', 'Please wait a moment and try again.');
          } else {
            showError('Failed to join team', data.error || 'Please try again later.');
          }
          return null;
        }

        return data;
      } catch (error) {
        console.error('Error joining team:', error);
        showError('Network error', 'Please check your connection and try again.');
        return null;
      }
    }

    // Initialize page
    async function init() {
      const inviteCode = getInviteCodeFromURL();

      if (!inviteCode) {
        showError('Invalid invite link', 'The invite link is malformed or incomplete.');
        return;
      }

      // Check if user is logged in
      if (!isLoggedIn()) {
        redirectToLogin(inviteCode);
        return;
      }

      // Automatically attempt to join
      showState('loadingState');

      const result = await joinTeam(inviteCode);

      if (!result) {
        // Error already shown by joinTeam
        return;
      }

      // Check if already member
      if (result.alreadyMember) {
        // Show already member state
        showState('alreadyMemberState');

        document.getElementById('openTeamBtn').onclick = () => {
          window.location.href = `/session-setup.html?groupId=${result.group.id}`;
        };

        document.getElementById('backToTeamsBtn').onclick = () => {
          window.location.href = `/my-teams.html?sport=${result.group.sport}`;
        };
        return;
      }

      // Success! Show success state
      document.getElementById('successTeamName').textContent = result.group.name;
      showState('successState');

      document.getElementById('openTeamAfterJoinBtn').onclick = () => {
        window.location.href = `/session-setup.html?groupId=${result.group.id}`;
      };
    }

    // Event listeners
    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = '/';
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      window.location.href = '/';
    });

    // Initialize on page load
    init();
  </script>
</body>
</html>
